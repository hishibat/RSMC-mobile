name: rsme_mobile
description: RSME - Real-time Speech transcription with AI Explanation
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Audio recording
  record: ^5.1.2

  # WebSocket for Deepgram STT
  web_socket_channel: ^3.0.1

  # HTTP for Claude API
  http: ^1.2.2

  # Storage for API keys
  shared_preferences: ^2.3.4

  # JSON serialization
  json_annotation: ^4.9.0

  # Permission handling
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
