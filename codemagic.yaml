workflows:
  ios-release:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build iOS
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - shivahyde@gmail.com
        notify:
          success: true
          failure: true

  ios-debug:
    name: iOS Debug Build (No Signing)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build iOS (debug)
        script: |
          flutter build ios --debug --no-codesign
    artifacts:
      - build/ios/**/*.app
    publishing:
      email:
        recipients:
          - shivahyde@gmail.com
        notify:
          success: true
          failure: true
